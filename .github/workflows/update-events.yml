name: Update events from Posh

# NOTE: the scheduled pull was RETIRED 2026-07-24. Posh sits behind Cloudflare,
# which hard-403s GitHub's datacenter IPs no matter what headers we send. The
# real puller now runs on Aiden's Mac (residential IP that Posh allows) via the
# launchd job com.dartyforlife.events-pull, every 30 min. This workflow stays
# only as a manual button for the day we move the pull to an unblocked host.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull latest events from Posh
        run: node scripts/update-events.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet events.json scripts/geocache.json counts.json 2>/dev/null; then
            echo "events.json unchanged, nothing to deploy."
          else
            git config user.name "dartyforlife-events-bot"
            git config user.email "actions@users.noreply.github.com"
            git add events.json scripts/geocache.json counts.json
            git commit -m "Auto-update events + going counts from Posh ($(date -u +%Y-%m-%d))"
            git push
          fi
